apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: acr-gateway-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: acr-secrets
  target:
    name: acr-gateway-secret
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: acr/control-plane/production
        property: DATABASE_URL
    - secretKey: REDIS_URL
      remoteRef:
        key: acr/control-plane/production
        property: REDIS_URL
    - secretKey: JWT_SECRET_KEY
      remoteRef:
        key: acr/control-plane/production
        property: JWT_SECRET_KEY
    - secretKey: KILLSWITCH_SECRET
      remoteRef:
        key: acr/control-plane/production
        property: KILLSWITCH_SECRET
    - secretKey: SERVICE_OPERATOR_API_KEY
      remoteRef:
        key: acr/control-plane/production
        property: SERVICE_OPERATOR_API_KEY
    - secretKey: OPERATOR_API_KEYS_JSON
      remoteRef:
        key: acr/control-plane/production
        property: OPERATOR_API_KEYS_JSON
    - secretKey: OPERATOR_SESSION_SECRET
      remoteRef:
        key: acr/control-plane/production
        property: OPERATOR_SESSION_SECRET
    - secretKey: OIDC_CLIENT_SECRET
      remoteRef:
        key: acr/control-plane/production
        property: OIDC_CLIENT_SECRET
    - secretKey: WEBHOOK_HMAC_SECRET
      remoteRef:
        key: acr/control-plane/production
        property: WEBHOOK_HMAC_SECRET
    - secretKey: AUDIT_SIGNING_SECRET
      remoteRef:
        key: acr/control-plane/production
        property: AUDIT_SIGNING_SECRET
    - secretKey: EXECUTOR_HMAC_SECRET
      remoteRef:
        key: acr/control-plane/production
        property: EXECUTOR_HMAC_SECRET
    - secretKey: EXECUTOR_CREDENTIAL_SECRET
      remoteRef:
        key: acr/control-plane/production
        property: EXECUTOR_CREDENTIAL_SECRET
    - secretKey: FINANCE_EXECUTOR_API_KEY
      remoteRef:
        key: acr/control-plane/production
        property: FINANCE_EXECUTOR_API_KEY
    - secretKey: EMAIL_EXECUTOR_API_KEY
      remoteRef:
        key: acr/control-plane/production
        property: EMAIL_EXECUTOR_API_KEY
    - secretKey: TICKET_EXECUTOR_API_KEY
      remoteRef:
        key: acr/control-plane/production
        property: TICKET_EXECUTOR_API_KEY
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: acr/control-plane/production
        property: AWS_ACCESS_KEY_ID
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: acr/control-plane/production
        property: AWS_SECRET_ACCESS_KEY
